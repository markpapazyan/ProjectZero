<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Orchestration Platform</title>
  <link rel="stylesheet" href="/static/style.css" />
  <!-- vis-network for the interactive agent graph -->
  <script src="https://cdn.jsdelivr.net/npm/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
</head>
<body>

  <!-- ===== Header ===== -->
  <header class="header">
    <div class="header-left">
      <span class="logo">⬡</span>
      <h1>Agent Orchestration Platform</h1>
    </div>
    <div class="header-right">
      <span class="ws-status" id="ws-status">● Connecting…</span>
    </div>
  </header>

  <!-- ===== Main Layout ===== -->
  <div class="main">

    <!-- Left: Graph canvas -->
    <div class="graph-panel">
      <div class="panel-toolbar">
        <span class="panel-title">Agent Graph</span>
        <div class="toolbar-actions">
          <button class="btn btn-sm" id="btn-connect-mode" title="Draw edges between agents">
            ✏ Connect
          </button>
          <button class="btn btn-sm btn-ghost" id="btn-fit" title="Fit graph to view">⊡ Fit</button>
        </div>
      </div>
      <div id="graph-canvas"></div>
      <div class="graph-hint" id="graph-hint">
        Drag nodes to rearrange &bull; Click <strong>Connect</strong> to draw edges &bull; Right-click node to delete
      </div>
    </div>

    <!-- Right: Event feed sidebar -->
    <div class="sidebar">
      <div class="panel-toolbar">
        <span class="panel-title">Live Events</span>
        <button class="btn btn-sm btn-ghost" id="btn-clear-feed">✕ Clear</button>
      </div>
      <div class="event-feed" id="event-feed">
        <div class="feed-empty">Events will appear here when agents run.</div>
      </div>
    </div>
  </div>

  <!-- ===== Bottom Action Bar ===== -->
  <div class="action-bar">
    <button class="btn btn-primary" id="btn-register">+ Register Agent</button>
    <button class="btn btn-accent" id="btn-run">▶ Run Agent</button>
    <div class="action-bar-right">
      <span id="agent-count">0 agents</span>
    </div>
  </div>

  <!-- ===== Register Agent Modal ===== -->
  <div class="modal-overlay hidden" id="modal-register">
    <div class="modal">
      <div class="modal-header">
        <h2>Register Agent</h2>
        <button class="modal-close" data-modal="modal-register">✕</button>
      </div>
      <form id="form-register" autocomplete="off">
        <div class="form-group">
          <label>Agent ID <span class="required">*</span></label>
          <input type="text" id="reg-id" placeholder="e.g. my_agent" required />
        </div>
        <div class="form-group">
          <label>Display Name <span class="required">*</span></label>
          <input type="text" id="reg-name" placeholder="e.g. My Agent" required />
        </div>
        <div class="form-group">
          <label>Agent Type <span class="required">*</span></label>
          <select id="reg-type">
            <option value="calculator">Calculator (simple)</option>
            <option value="research">Research (complex, multi-step)</option>
          </select>
        </div>
        <div class="form-group">
          <label>Description</label>
          <input type="text" id="reg-desc" placeholder="Optional description" />
        </div>
        <div class="form-group form-group-inline">
          <label>Node Color</label>
          <input type="color" id="reg-color" value="#4A90D9" />
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-ghost" data-modal="modal-register">Cancel</button>
          <button type="submit" class="btn btn-primary">Register</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ===== Run Agent Modal ===== -->
  <div class="modal-overlay hidden" id="modal-run">
    <div class="modal">
      <div class="modal-header">
        <h2>Run Agent</h2>
        <button class="modal-close" data-modal="modal-run">✕</button>
      </div>
      <form id="form-run" autocomplete="off">
        <div class="form-group">
          <label>Select Agent <span class="required">*</span></label>
          <select id="run-agent-select"></select>
        </div>
        <div class="form-group">
          <label>Input <span class="required">*</span></label>
          <textarea id="run-input" rows="3" placeholder="e.g. What is 12 multiplied by 7?" required></textarea>
        </div>
        <div class="form-group sample-inputs">
          <label>Sample inputs:</label>
          <div class="chips" id="sample-chips"></div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-ghost" data-modal="modal-run">Cancel</button>
          <button type="submit" class="btn btn-accent">Run</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ===== Result Toast ===== -->
  <div class="toast hidden" id="result-toast">
    <div class="toast-icon">✓</div>
    <div class="toast-body">
      <div class="toast-title" id="toast-title"></div>
      <div class="toast-msg" id="toast-msg"></div>
    </div>
    <button class="toast-close" id="toast-close">✕</button>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
