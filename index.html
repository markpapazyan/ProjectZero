<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Piano Chord Learner</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <header>
      <h1>🎹 Piano Chord Learner</h1>
      <p class="subtitle">Learn, explore, and practice piano chords</p>
    </header>

    <!-- Tab Navigation -->
    <nav class="tabs">
      <button class="tab active" data-tab="explore">Explore Chords</button>
      <button class="tab" data-tab="quiz">Practice Quiz</button>
    </nav>

    <!-- Explore Tab -->
    <section id="tab-explore" class="tab-content active">
      <div class="controls">
        <div class="control-group">
          <label for="root-select">Root Note</label>
          <select id="root-select"></select>
        </div>
        <div class="control-group">
          <label for="chord-select">Chord Type</label>
          <select id="chord-select"></select>
        </div>
        <button id="play-btn" class="btn primary">▶ Play Chord</button>
        <button id="play-arp-btn" class="btn secondary">🎵 Arpeggiate</button>
      </div>

      <div class="chord-info">
        <h2 id="chord-name">C Major</h2>
        <p id="chord-description"></p>
        <div class="chord-notes-display">
          <span class="label">Notes:</span>
          <span id="chord-notes-list"></span>
        </div>
        <div class="chord-intervals-display">
          <span class="label">Formula:</span>
          <span id="chord-intervals-list"></span>
        </div>
      </div>
    </section>

    <!-- Quiz Tab -->
    <section id="tab-quiz" class="tab-content">
      <div class="quiz-controls">
        <button id="quiz-start-btn" class="btn primary">Start New Round</button>
        <div class="quiz-score">
          Score: <span id="quiz-score">0</span> / <span id="quiz-total">0</span>
        </div>
      </div>

      <div id="quiz-question" class="quiz-question hidden">
        <p class="quiz-prompt" id="quiz-prompt"></p>
        <button id="quiz-play-btn" class="btn secondary hidden">▶ Play Chord</button>
        <div class="quiz-options" id="quiz-options"></div>
        <div id="quiz-feedback" class="quiz-feedback hidden"></div>
        <button id="quiz-next-btn" class="btn primary hidden">Next Question</button>
      </div>
    </section>

    <!-- Piano Keyboard (shared) -->
    <div class="keyboard-container">
      <div id="piano-keyboard"></div>
    </div>

    <footer>
      <p>Click any key to hear its note &bull; Highlighted keys show the current chord</p>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/soundfont-player/dist/soundfont-player.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
